<!DOCTYPE html>
<html>
<head>
    <title>Seznam výpůjček</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #007bff; color: white; }
        .btn { display: inline-block; background: #007bff; color: white; padding: 10px 15px; text-decoration: none; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>Všechny půjčené knihy v systému</h2>
    
    <table>
        <thead>
            <tr>
                <th>Kniha</th>
                <th>Kdo si půjčil</th>
                <th>Datum výpůjčky</th>
            </tr>
        </thead>
        <tbody>
            {% for v in vypujcky %}
            <tr>
                <td><strong>{{ v.kniha.nazev }}</strong> ({{ v.kniha.autor }})</td>
                <td>{{ v.uzivatel }}</td>
                <td>{{ v.datum_vypujcky|date:"d. m. Y H:i" }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3">Momentálně není půjčená žádná kniha.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <a href="{% url 'katalog' %}" class="btn">Zpět do katalogu</a>
</body>
</html>
