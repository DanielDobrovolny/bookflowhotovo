<!DOCTYPE html>
<html>
<head>
    <title>Zapůjčení knihy</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        .form-group { margin-bottom: 15px; }
        .btn { display: inline-block; background: #28a745; color: white; padding: 10px 15px; text-decoration: none; border-radius: 5px; border: none; cursor: pointer; }
        .btn-sec { background: #6c757d; }
        select { padding: 10px; width: 100%; max-width: 300px; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Chceš si půjčit knihu: <strong>{{ kniha.nazev }}</strong></h2>
    <p>Autor: {{ kniha.autor }}</p>

    <form method="POST" style="margin-top: 20px;">
        {% csrf_token %}
        <div class="form-group">
            <label for="uzivatel"><strong>Vyber uživatele z tabulky:</strong></label><br><br>
            <select name="uzivatel" id="uzivatel" required>
                <option value="">-- Vyber člověka --</option>
                {% for u in uzivatele %}
                    <option value="{{ u.id }}">{{ u.jmeno }} ({{ u.email }})</option>
                {% endfor %}
            </select>
        </div>
        <br>
        <button type="submit" class="btn">Potvrdit půjčení</button>
        <a href="{% url 'katalog' %}" class="btn btn-sec">Zpět do katalogu</a>
    </form>
</body>
</html>
